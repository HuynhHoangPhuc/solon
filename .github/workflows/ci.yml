name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  clippy:
    name: Clippy
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clippy
        run: cargo clippy -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: fmt
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Install ast-grep (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL https://github.com/ast-grep/ast-grep/releases/latest/download/app-x86_64-unknown-linux-gnu.zip -o sg.zip
          unzip -o sg.zip -d "$HOME/.cargo/bin"
          chmod +x "$HOME/.cargo/bin/sg" "$HOME/.cargo/bin/ast-grep"

      - name: Install ast-grep (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -fsSL https://github.com/ast-grep/ast-grep/releases/latest/download/app-x86_64-apple-darwin.zip -o sg.zip
          unzip -o sg.zip -d "$HOME/.cargo/bin"
          chmod +x "$HOME/.cargo/bin/sg" "$HOME/.cargo/bin/ast-grep"

      - name: Install ast-grep (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -fsSL https://github.com/ast-grep/ast-grep/releases/latest/download/app-x86_64-pc-windows-msvc.zip -o sg.zip
          unzip -o sg.zip -d "$USERPROFILE/.cargo/bin"

      - name: Build and run tests
        run: cargo test -- --include-ignored
        env:
          # Skip LSP diagnostics tests on Windows — they hang due to missing poll() support
          SOLON_SKIP_LSP_DIAG: ${{ runner.os == 'Windows' && '1' || '' }}

  go-hooks:
    name: Go Hooks Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hooks/scripts
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: hooks/scripts/go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Build all targets
        run: make build-all
        continue-on-error: true  # Make may not be available in all environments
