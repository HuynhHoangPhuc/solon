name: Sync Plugin Distribution

on:
  push:
    tags: ["v*"]

jobs:
  sync:
    name: Sync to solon-plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Prepare distribution
        run: |
          mkdir -p dist/.claude-plugin dist/hooks dist/scripts
          cp -r skills dist/
          cp .claude-plugin/plugin.json dist/.claude-plugin/
          cp hooks/hooks.json dist/hooks/
          cp scripts/ensure-binary.sh dist/scripts/
          cp scripts/install.sh dist/scripts/
          cp LICENSE dist/
          cp README.md dist/

      - name: Push to distribution repo
        env:
          DEPLOY_TOKEN: ${{ secrets.PLUGIN_DEPLOY_TOKEN }}
        run: |
          cd dist
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync plugin ${{ github.ref_name }}"
          git tag "${{ github.ref_name }}"
          git remote add origin "https://x-access-token:${DEPLOY_TOKEN}@github.com/HuynhHoangPhuc/solon-plugin.git"
          git push -f origin main
          git push origin "${{ github.ref_name }}"
