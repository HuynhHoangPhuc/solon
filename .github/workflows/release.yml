name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: sl-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: sl-linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            name: sl-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: sl-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: sl-windows-x64.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Run tests
        if: "!matrix.cross"
        run: cargo test --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/sl ${{ matrix.name }}
          sha256sum ${{ matrix.name }} > ${{ matrix.name }}.sha256

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item target/${{ matrix.target }}/release/sl.exe ${{ matrix.name }}
          $hash = (Get-FileHash ${{ matrix.name }} -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.name }}" | Out-File -Encoding ascii ${{ matrix.name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256

  build-hooks:
    name: Build hooks ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: hooks/scripts
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            name: solon-hooks-linux-x64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            name: solon-hooks-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            name: solon-hooks-darwin-x64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            name: solon-hooks-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            name: solon-hooks-windows-x64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: hooks/scripts/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o ../../${{ matrix.name }} .

      - name: SHA256 (Unix)
        if: matrix.os != 'windows-latest'
        working-directory: .
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum ${{ matrix.name }} > ${{ matrix.name }}.sha256
          else
            shasum -a 256 ${{ matrix.name }} > ${{ matrix.name }}.sha256
          fi

      - name: SHA256 (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: .
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.name }}" | Out-File -Encoding ascii "${{ matrix.name }}.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256

  release:
    name: Create GitHub Release
    needs: [build, build-hooks]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "solon ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/**/*
